services:
  - type: web
    name: bethesda-grace-hub
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
    headers:
      # Service worker must never be cached by the CDN — otherwise users
      # stay stuck on an old shell after a deploy.
      - path: /sw.js
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /registerSW.js
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /manifest.webmanifest
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      # Hashed assets (Vite emits content-hashed filenames) are safe to cache forever.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA fallback: every unknown path serves index.html so React Router can handle it.
      - type: rewrite
        source: /*
        destination: /index.html
